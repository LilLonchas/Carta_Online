<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olimpo Pub - Luxury Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #080808; }
        body { background-color: var(--dark); color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Efecto de borde dorado animado para platos estrella */
        .premium-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.1);
            overflow: hidden;
        }
        .premium-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: 0.5s;
        }
        .premium-card:hover::before { left: 100%; }

        .gold-text { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Acordeón refinado */
        .section-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease-out; opacity: 0; }
        .section-wrapper.open .section-content { grid-template-rows: 1fr; opacity: 1; margin-top: 1.5rem; }
        .inner-content { overflow: hidden; }

        .price-tag {
            background: rgba(212, 175, 55, 0.1);
            padding: 4px 12px;
            border-radius: 99px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--gold);
            font-weight: 800;
        }
    </style>
</head>
<body class="antialiased">

    <header class="relative h-[40vh] flex items-center justify-center border-b border-white/5">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1555244162-803834f70033?q=80&w=2070')] bg-cover bg-fixed bg-center opacity-30"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-dark via-dark/40 to-transparent"></div>
        <div class="relative text-center">
            <h1 class="font-display text-5xl md:text-7xl gold-text uppercase tracking-tighter mb-2">Dehesa Terrones</h1>
            <div class="h-1 w-24 bg-gold mx-auto mb-4 rounded-full shadow-[0_0_15px_rgba(212,175,55,0.5)]"></div>
            <p class="text-xs uppercase tracking-[0.5em] text-white/40">Gastro-Experiencia Premium</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-12">
        <div id="menu-loader" class="text-center py-20 text-gold animate-pulse uppercase tracking-widest text-xs">Cargando Selección del Chef...</div>
        <div id="menu-container" class="space-y-8"></div>
    </main>

    <footer class="py-20 text-center border-t border-white/5">
        <p class="text-[10px] text-white/20 uppercase tracking-widest mb-4 italic">"El sabor de la dehesa en cada bocado"</p>
        
    </footer>

    <script>
        // URL de tu Google Sheets (publicado como CSV)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLQNS-lUWdqYaXpjzz2Q2pRkvNmKbVVqYvGAcu-uG8eCw3HPbB25w68WA_KLP9F7TeutOlbWG3mAuy/pub?output=csv'; 

        async function loadMenu() {
            try {
                // Si no tienes el CSV listo, usaremos datos de prueba para que veas el diseño
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // Aquí iría el parseo del CSV... por ahora te pongo el render visual PRO:
                renderProMenu(); 
            } catch (e) {
                renderProMenu(); // Render de prueba si falla el fetch
            }
        }

        function renderProMenu() {
            const container = document.getElementById('menu-container');
            document.getElementById('menu-loader').style.display = 'none';
            
            // Datos de prueba (aquí irían los de tu Excel)
            const demoData = [
                { seccion: "Cortes Ibéricos", platos: [
                    {n: "Presa de Bellota", p: "22.50€", d: "Acompañada de patatas panaderas y pimientos de padrón."},
                    {n: "Secreto al Carbón", p: "19.80€", d: "Madurado 15 días en cámara propia."}
                ]},
                { seccion: "Selección de Quesos", platos: [
                    {n: "Torta de la Serena", p: "14.00€", d: "Queso de oveja merina con textura cremosa."},
                    {n: "Queso Viejo al Romero", p: "12.50€", d: "Curado 12 meses en aceite de oliva."}
                ]}
            ];

            demoData.forEach((sec, idx) => {
                const wrap = document.createElement('div');
                wrap.className = 'section-wrapper';
                wrap.innerHTML = `
                    <div onclick="this.parentElement.classList.toggle('open')" class="flex justify-between items-center cursor-pointer border-b border-white/10 pb-4 group">
                        <h2 class="text-2xl font-display tracking-tight group-hover:text-gold transition-colors italic">${sec.seccion}</h2>
                        <span class="text-gold opacity-30 text-2xl group-hover:rotate-45 transition-transform">+</span>
                    </div>
                    <div class="section-content">
                        <div class="inner-content space-y-4">
                            ${sec.platos.map(p => `
                                <div class="premium-card p-6 rounded-2xl group active:scale-[0.98] transition-all">
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="font-bold text-lg text-white group-hover:text-gold transition-colors">${p.n}</h3>
                                        <span class="price-tag">${p.p}</span>
                                    </div>
                                    <p class="text-sm text-white/50 leading-relaxed font-light">${p.d}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(wrap);
            });
        }

        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>
</body>
</html>
