<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dehesa Terrones - Carta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        dark: '#050505',
                        glass: 'rgba(255, 255, 255, 0.03)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #e5e5e5; scroll-behavior: smooth; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.1); transition: all 0.3s ease; }
        .gold-gradient-text { background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); }
        .section-content.open { max-height: 5000px; transition: max-height 1s ease-in; }
        .admin-editable:focus { outline: 1px dashed #D4AF37; background: rgba(212, 175, 55, 0.1); padding: 2px 5px; border-radius: 4px; }
        .chevron { transition: transform 0.3s ease; }
        .open .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="relative h-64 flex flex-col items-center justify-center border-b border-gold/10">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80')] bg-cover bg-center opacity-20"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-dark/50 to-dark"></div>
        <div class="relative z-10 text-center px-4">
            <h1 class="font-display text-4xl gold-gradient-text uppercase tracking-widest mb-2">Dehesa Terrones</h1>
            <p class="text-gold/60 tracking-[0.3em] text-[10px] font-semibold uppercase">Experiencia Gastronómica</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
        <div class="flex flex-col items-center gap-4 mb-12">
            <button onclick="downloadVCard()" class="px-8 py-3 bg-gold/10 border border-gold/30 rounded-full text-gold font-bold uppercase tracking-widest text-[10px] hover:bg-gold hover:text-dark transition-all flex items-center gap-2">
                Añadir a Contactos
            </button>
            <div id="admin-controls" class="hidden flex gap-2 animate-bounce">
                <button onclick="saveChanges()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase">Guardar Cambios</button>
                <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase">Cancelar</button>
            </div>
        </div>

        <div id="menu-container" class="space-y-6"></div>
    </main>

    <footer class="py-12 text-center opacity-50">
        <button onclick="loginAdmin()" class="text-[9px] text-gold/20 hover:text-gold uppercase tracking-widest">Panel de Administración</button>
    </footer>

    <script>
        // Cargo los datos del LocalStorage si existen, si no, los por defecto
        let menuData = JSON.parse(localStorage.getItem('menu_terrones')) || [
            {
                "seccion": "Nuestras Tapas",
                "items": [
                    {"nombre": "Tapa de Jamón Ibérico", "precio": 3.00},
                    {"nombre": "Tapa de Tortilla de Patatas", "precio": 2.50}
                ]
            },
            {
                "seccion": "Nuestras Carnes",
                "items": [
                    {"nombre": "Solomillo Ibérico", "precio": 19.00},
                    {"nombre": "Chuletón de Vaca", "precio": 42.00, "observaciones": "Precio por kg"}
                ]
            }
        ];

        let isAdmin = false;

        function toggleSection(idx) {
            const content = document.getElementById(`section-content-${idx}`);
            const wrapper = document.getElementById(`section-wrapper-${idx}`);
            content.classList.toggle('open');
            wrapper.classList.toggle('open');
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            menuData.forEach((section, sIdx) => {
                const sectionEl = document.createElement('section');
                sectionEl.id = `section-wrapper-${sIdx}`;
                sectionEl.className = 'mb-4 border-b border-gold/5 pb-4';

                let itemsHtml = '';
                section.items.forEach((item, iIdx) => {
                    itemsHtml += `
                        <div class="glass-card p-4 rounded-xl flex justify-between items-center mb-2">
                            <div class="flex-1">
                                <h3 class="${isAdmin ? 'admin-editable' : ''} text-white font-medium" 
                                    contenteditable="${isAdmin}" onblur="updateData(${sIdx}, ${iIdx}, 'nombre', this.innerText)">${item.nombre}</h3>
                            </div>
                            <div class="text-right">
                                <span class="${isAdmin ? 'admin-editable' : ''} text-gold font-bold" 
                                      contenteditable="${isAdmin}" onblur="updateData(${sIdx}, ${iIdx}, 'precio', this.innerText)">${item.precio || item.observaciones}</span>
                            </div>
                        </div>`;
                });

                sectionEl.innerHTML = `
                    <div onclick="toggleSection(${sIdx})" class="flex justify-between items-center cursor-pointer py-2 group">
                        <h2 class="font-display text-2xl gold-gradient-text uppercase tracking-widest">${section.seccion}</h2>
                        <svg class="chevron w-6 h-6 text-gold opacity-50 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                    <div id="section-content-${sIdx}" class="section-content mt-4">
                        ${itemsHtml}
                    </div>`;
                container.appendChild(sectionEl);
            });
        }

        function loginAdmin() {
            const user = prompt("Usuario:");
            const pass = prompt("Contraseña:");
            if(user === "admin" && pass === "admin") {
                isAdmin = true;
                document.getElementById('admin-controls').classList.remove('hidden');
                renderMenu(); // Re-renderizamos para habilitar edición
                alert("Modo edición activado. Haz clic en los textos para cambiarlos.");
            } else {
                alert("Acceso denegado");
            }
        }

        function updateData(sIdx, iIdx, field, value) {
            if(field === 'precio') {
                menuData[sIdx].items[iIdx][field] = value;
            } else {
                menuData[sIdx].items[iIdx][field] = value;
            }
        }

        function saveChanges() {
            localStorage.setItem('menu_terrones', JSON.stringify(menuData));
            alert("¡Cambios guardados localmente! Para que sean permanentes para todos, debes actualizar tu archivo index.html en GitHub con el nuevo JSON.");
            isAdmin = false;
            document.getElementById('admin-controls').classList.add('hidden');
            renderMenu();
        }

        function downloadVCard() {
            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Dehesa Terrones\nTEL:+34000000000\nEND:VCARD";
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = 'Dehesa_Terrones.vcf';
            a.click();
        }

        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
