<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dehesa Terrones | Carta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        body { background-color: var(--dark); color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        .gold-text { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Tarjetas de platos mejoradas */
        .premium-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.05); border-color: rgba(212, 175, 55, 0.3); }

        .price-tag {
            background: rgba(212, 175, 55, 0.1);
            padding: 4px 12px;
            border-radius: 99px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--gold);
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* Acordeón */
        .section-content { display: grid; grid-template-rows: 0fr; transition: all 0.5s ease; opacity: 0; pointer-events: none; }
        .section-wrapper.open .section-content { grid-template-rows: 1fr; opacity: 1; margin-top: 1.5rem; pointer-events: auto; }
        .inner-content { overflow: hidden; }
        
        .chevron { transition: transform 0.4s ease; color: var(--gold); opacity: 0.4; }
        .section-wrapper.open .chevron { transform: rotate(180deg); opacity: 1; }

        /* Animación de carga */
        .loader-ring { width: 40px; height: 40px; border: 2px solid rgba(212, 175, 55, 0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">

    <header class="relative h-[35vh] flex items-center justify-center border-b border-white/5">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1555244162-803834f70033?q=80&w=2070')] bg-cover bg-center opacity-20"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-dark via-dark/40 to-transparent"></div>
        <div class="relative text-center px-4">
            <h1 class="font-display text-4xl md:text-6xl gold-text uppercase tracking-tighter mb-1">Olimpo Pub</h1>
            <p class="text-[10px] uppercase tracking-[0.6em] text-white/40 font-semibold">Premium Experience</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-5 py-10">
        
        <div class="flex justify-center mb-12">
            <button onclick="downloadVCard()" class="flex items-center gap-3 px-8 py-3 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase tracking-[0.2em] font-bold hover:bg-gold hover:text-dark transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M224,48H32A16,16,0,0,0,16,64V192a16,16,0,0,0,16,16H224a16,16,0,0,0,16-16V64A16,16,0,0,0,224,48Zm0,144H32V64H224V192ZM160,112a40,40,0,1,1-40,40A40,40,0,0,1,160,112Z"></path></svg>
                Guardar Contacto
            </button>
        </div>

        <div id="menu-loader" class="flex flex-col items-center justify-center py-20">
            <div class="loader-ring mb-4"></div>
            <p class="text-[10px] uppercase tracking-widest text-gold/50">Consultando la Dehesa...</p>
        </div>

        <div id="menu-container" class="space-y-6"></div>

    </main>

    <footer class="py-16 text-center border-t border-white/5 bg-black/20">
        <div class="font-display text-xl gold-text mb-2 italic text-2xl">Dehesa Terrones</div>
        <p class="text-[9px] text-white/20 uppercase tracking-[0.3em] mb-6">Huércal-Overa • Almería</p>
        <a href="https://docs.google.com/spreadsheets/d/TU_ID_AQUÍ" target="_blank" class="text-[8px] text-white/10 hover:text-gold uppercase tracking-widest transition-colors">Acceso Administración</a>
    </footer>

    <script>
        // --- CONFIGURACIÓN ---
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLQNS-lUWdqYaXpjzz2Q2pRkvNmKbVVqYvGAcu-uG8eCw3HPbB25w68WA_KLP9F7TeutOlbWG3mAuy/pub?output=csv'; 

        async function init() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const menuData = parseCSV(csvText);
                renderMenu(menuData);
            } catch (error) {
                console.error(error);
                document.getElementById('menu-loader').innerHTML = "<p class='text-red-500 text-xs uppercase'>Error al conectar con la carta.</p>";
            }
        }

        function parseCSV(text) {
            const lines = text.split('\n').filter(l => l.trim() !== "");
            const result = {};
            // Empezamos en 1 para saltar los encabezados del Excel
            for (let i = 1; i < lines.length; i++) {
                const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Soporta comas dentro de comillas
                const [seccion, nombre, precio, desc] = columns.map(c => c?.replace(/"/g, '').trim());
                
                if (!seccion) continue;
                if (!result[seccion]) result[seccion] = [];
                result[seccion].push({ nombre, precio, desc });
            }
            return result;
        }

        function renderMenu(data) {
            const container = document.getElementById('menu-container');
            const loader = document.getElementById('menu-loader');
            loader.style.display = 'none';

            Object.keys(data).forEach(seccion => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'section-wrapper';
                
                sectionDiv.innerHTML = `
                    <div onclick="this.parentElement.classList.toggle('open')" class="flex justify-between items-center cursor-pointer border-b border-white/10 pb-4 group">
                        <h2 class="text-xl md:text-2xl font-display tracking-wide group-hover:text-gold transition-colors italic uppercase">${seccion}</h2>
                        <svg class="chevron w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </div>
                    <div class="section-content">
                        <div class="inner-content space-y-4 pt-2">
                            ${data[seccion].map(p => `
                                <div class="premium-card p-5 rounded-2xl">
                                    <div class="flex justify-between items-start gap-4">
                                        <div class="flex-1">
                                            <h3 class="font-bold text-white tracking-wide text-sm md:text-base">${p.nombre}</h3>
                                            ${p.desc ? `<p class="text-[11px] text-white/40 mt-1 leading-relaxed">${p.desc}</p>` : ''}
                                        </div>
                                        <div class="price-tag whitespace-nowrap">${p.precio}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(sectionDiv);
            });
        }

        function downloadVCard() {
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:Dehesa Terrones\nORG:Restaurante Ibérico\nTITLE:Reserva tu mesa\nTEL:+34000000000\nURL:https://dehesaterrones.com\nEND:VCARD`;
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'DehesaTerrones.vcf';
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
